[loggers]
keys=root,mlac_transformer

[handlers]
keys=fileHandler,consoleHandler

[formatters]
keys=detailed

[logger_root]
level=WARNING
handlers=

[logger_mlac_transformer]
level=DEBUG
handlers=fileHandler,consoleHandler
qualname=mlac_transformer
propagate=0

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailed
args=('output/logs/mlac_etl.log', 'a', 5242880, 5, 'utf-8')

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=detailed
args=(sys.stderr,)

[formatter_detailed]
format=%(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt=%Y-%m-%d %H:%M:%S
