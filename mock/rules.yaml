# =============================================================================
# DECLARATIVE TRANSFORM SPECIFICATION  —  multi-sheet
# =============================================================================
# Top-level structure:
#
#   input:                   declares the source workbook and which sheets to process
#   sheets:                  one entry per sheet; each is a full transform definition
#     <sheet_name>:
#       sitecore_config:     sitecore target settings for this sheet's output
#         rootPath:          sitecore destination path
#         importStrategy:    { mode, missingItemAction }
#         backupStrategy:    { enabled, archivePath, prefix, maxBackupsToKeep }
#         dictionaries:
#           templates:       template alias → GUID map
#           relations:       relation alias → sitecore path (optional)
#       source_structure:    maps column_label, column_base and column_data to actual column headers
#       items:               declarative hierarchy to build (group → spec → packageSpec)
#
# ITEM DEFINITION KEYS:
#   templateKey       : sitecore template alias (must exist in sitecore_config.dictionaries.templates)
#   filter            : JQ expression applied to the context list for this level
#   scope_children    : false (default) | true
#                         true — slice the parent context between consecutive matched rows
#                                so each item only sees the rows that belong to it
#   expand_variants   : false (default) | true
#                         true  — JQ operates on normalized variant rows derived
#                                 from source_structure.column_data and the parent spec row:
#                                 [{__column__, __value__, __base_value__}, ...]
#   name              : { field, transform }  — resolve name from a row field
#   name_static       : literal string name
#   fields            : list of { name, value, transform }
#   children          : nested item definitions — fully recursive, N levels deep
#
# TRANSFORM SYNTAX:
#   'jq: <expression>'  — JQ program applied to the resolved scalar string value
#                         supports piping: 'jq: ascii_upcase | ltrimstr(" ")'
#   '<regex>'           — regex pattern; returns first capture group (default, no prefix)
#
# SPECIAL value TOKENS:
#   $base     resolves to the value of source_structure.column_base for the current row
#   $variant  resolves to the value of the current variant column (only when expand_variants: true)
# =============================================================================

# ---------------------------------------------------------------------------
# input — tells the processor where to find data for each sheet
# ---------------------------------------------------------------------------
input:
  workbook_key: "workbook"      # top-level key in the JSON that holds the workbook
  sheets:                       # sheet names to process
    - specs
    - updates
    - oneToMany
    - explode
    - schema


sheets:
  specs:

    sitecore_config:
      rootPath: "/sitecore/content/acura-platform/resources/components/vehicles/2025/integra/page-content/specs/specifications"
      importStrategy:
        mode: "wipeAndLoad"
        missingItemAction: "ignore"
      backupStrategy:
        enabled: true
        archivePath: "/sitecore/content/acura-platform/resources/components/vehicles/2025/integra/page-content/specs/archive"
        prefix: "specs-and-price"
        maxBackupsToKeep: 5
      dictionaries:
        templates:
          folder:      "{E594C7E0-5616-4734-BFA0-B043778D11E4}"
          group:       "{87169817-97AA-409F-8324-342CF34E7055}"
          spec:        "{6EEC54AA-3E5D-4F71-AB97-3253ED1E6D38}"
          packageSpec: "{050DEEDD-ADD5-4C8A-A75F-312D5C070D6D}"
          modal:       "{7A770BDC-69A8-4566-9CB1-E4D037BB8A8B}"
        relations:
          package: "/sitecore/content/acura-platform/resources/components/vehicles/2025/integra/build-and-price-components/trims/packages"
          internalCrossReference: "SELF"

    source_structure:
      column_label: "Packages"
      column_base: "Integra"
      column_data:
        - "A-Spec"
        - "A-Spec w/Technology (CVT)"
        - "A-Spec w/Technology (6MT)"
        - "Type S"

    items:
      - templateKey: "group"
        filter: 'map(select(.Packages.value | test(" > ")))'
        name:
          field: "Packages"
          transform: 'jq: split(" > ") | .[0]'
          type: "getType"
        fields:
          - name: "Group Label"
            value: "Packages"
            transform: 'jq: split(" > ") | .[0] | ascii_upcase'
            type: "getType"
          - name: "Group Description"
            value: "Packages"
            transform: 'jq: split(" > ") | .[1] | ascii_upcase'
            type: "getType"
          - name: "modal"
            computed: true
            condition: 'jq: .Packages.annotation != null and .Packages.annotation != ""'
            value: "Packages"
            transform: 'jq: ascii_downcase | gsub("[^a-z0-9]+"; "-") | ltrimstr("-") | rtrimstr("-") + "-modal"'
            omit_if_false: true
            type: "getType"
  
        children:
          - templateKey: "modal"
            filter: '[.[0] | select(.Packages.annotation != null and .Packages.annotation != "")]'
            name:
              field: "Packages"
              transform: 'jq: ascii_downcase | gsub("[^a-z0-9]+"; "-") | ltrimstr("-") | rtrimstr("-") + "-modal"'
            fields:
              - name: "Headline"
                value: "$annotation:Packages"
                transform: 'Headline:\s*(.+?)(?:\n|$)'
                type: "getType"
              - name: "Description"
                value: "$annotation:Packages"
                transform: 'Description:\s*([\s\S]+?)(?:\nImage:|$)'
                type: "getType"
              - name: "Image"
                value: "$annotation:Packages"
                transform: 'Image:\s*(.+)'
                type: "getType"

          - templateKey: "spec"
            filter: 'map(select(.Category.value != ""))'
            scope_children: true
            name:
              field: "Category"
            fields:
              - name: "Specification Label"
                value: "Category"
                type: "getType"
              - name: "modal"
                computed: true
                condition: 'jq: .Category.annotation != null and .Category.annotation != ""'
                value: "Category"
                transform: 'jq: ascii_downcase | gsub("[^a-z0-9]+"; "-") | ltrimstr("-") | rtrimstr("-") + "-modal"'
                omit_if_false: true
                type: "getType"

            children:
              - templateKey: "modal"
                filter: '[.[0] | select(.Category.annotation != null and .Category.annotation != "")]'
                name:
                  field: "Category"
                  transform: 'jq: ascii_downcase | gsub("[^a-z0-9]+"; "-") | ltrimstr("-") | rtrimstr("-") + "-modal"'
                fields:
                  - name: "Headline"
                    value: "$annotation:Category"
                    transform: 'Headline:\s*(.+?)(?:\n|$)'
                    type: "getType"
                  - name: "Description"
                    value: "$annotation:Category"
                    transform: 'Description:\s*([\s\S]+?)(?:\nImage:|$)'
                    type: "getType"
                  - name: "Image"
                    value: "$annotation:Category"
                    transform: 'Image:\s*(.+)'
                    type: "getType"

              - templateKey: "spec"
                filter: 'map(select(.Item.value != ""))'
                name:
                  field: "Item"
                fields:
                  - name: "Specification Label"
                    value: "Item"
                  - name: "Specification Value"
                    computed: true
                    condition: 'jq: .__base_cell__.annotation != null and .__base_cell__.annotation != ""'
                    value: "$base_annotation"
                    else_value: "$base"
                    type: "getType"
               
                children:
                  - templateKey: "packageSpec"
                    expand_variants: true
                    filter: '.'
                    fields:
                      - name: "Specification Value"
                        computed: true
                        condition: 'jq: .__cell__.annotation != null and .__cell__.annotation != ""'
                        value: "$variant_annotation"
                        else_value: "$variant"
                        type: "getType"
                      - name: "Vehicle Package"
                        value: "__column__"
                        transform: "jq: [.]"
                        relationKey: "package"
                        type: "lookup"
                      - name: "Is Dot"
                        computed: true
                        condition: 'jq: .__cell__.value == "n"'
                        value: true
                        else_value: false
                        type: "getType"


  updates:
    sitecore_config:
      rootPath: "/sitecore/content/acura-platform/resources/components/vehicles/2025/integra/page-content/specs/updates"
      importStrategy:
        mode: "wipeAndLoad"
        missingItemAction: "ignore"
      backupStrategy:
        enabled: true
        archivePath: "../"
        prefix: "updates"
        maxBackupsToKeep: 5
      dictionaries:
        templates:
          row:   "{SOME-TEMPLATE-GUID-HERE}"

    source_structure:
      column_label: "Feature"
      column_base: "Revision Date"
      column_data: []

    items:
      - templateKey: "row"
        filter: '[.[] | select(.Feature.value != null and .Feature.value != "" and .Feature.value != "\u00a0")]'
        name: "Feature"
        fields:
          - name: "Revision Date"
            value: "Revision Date"
          - name: "Feature"
            value: "Feature"
          - name: "Change"
            value: "Contents of Change"
          - name: "Affected Trims"
            value: "Affected Trims"
          - name: "Before"
            value: "Before"
          - name: "After"
            value: "After"
          - name: "Notes"
            value: "Notes"

  oneToMany:
    sitecore_config:
      rootPath: "/sitecore/content/..."
      importStrategy:
        mode: "wipeAndLoad"
        missingItemAction: "ignore"
      backupStrategy:
        enabled: true
        archivePath: "../"
        prefix: "components"
        maxBackupsToKeep: 5
      dictionaries:
        templates:
          component: "{component-template-guid}"
          relation: "{relation-template-guid}"

    source_structure:
      column_label: "Componente"
      column_base: "Componente"
      column_data:
        - "Servicio Asociado"
        - "Base de Datos"
        - "Frontend"

    items:
      - templateKey: "component"
        filter: 'map(select(.Componente.value != ""))'
        name:
          field: "Componente"
        fields:
          - name: "Tipo"
            value: "Tipo"
          - name: "Version"
            value: "Versión"
        children:
          - templateKey: "relation"
            expand_variants: true
            filter: 'map(select(.__cell__.value == "X"))'


  explode:
    sitecore_config:
      rootPath: "/sitecore/content/..."
      importStrategy:
        mode: "wipeAndLoad"
        missingItemAction: "ignore"
      backupStrategy:
        enabled: true
        archivePath: "../"
        prefix: "components"
        maxBackupsToKeep: 5
      dictionaries:
        templates:
          component: "{component-template-guid}"

    source_structure:
      column_label: "Componente"
      column_base: "Componente"
      column_data: []

    items:
      - templateKey: "component"
        filter: '[.[] | . as $row | ($row.Keys.value | split("|") | map(ltrimstr(" ") | rtrimstr(" ")) | .[]) | {Componente: $row.Componente, Tipo: $row.Tipo, "Versión": $row["Versión"], Key: .}]'
        name:
          field: "Componente"
        fields:
          - name: "Tipo"
            value: "Tipo"
          - name: "Version"
            value: "Versión"
          - name: "Key"
            value: "Key"

  schema:
    sitecore_config:
      rootPath: "/sitecore/content/..."
      importStrategy:
        mode: "wipeAndLoad"
        missingItemAction: "ignore"
      backupStrategy:
        enabled: true
        archivePath: "../"
        prefix: "components"
        maxBackupsToKeep: 5
      dictionaries:
        templates:
          component: "{component-template-guid}"

    items:
      - templateKey: "component"
        filter: '[group_by(.Component.value)[] | select(length > 0 and .[0].Component.value != "") | .[0] + {"__scope__": .}]'
        name:
          field: "Component"
        dynamic_fields:
          source: "__scope__"
          filter: 'map(select(."Attribute Name".value != ""))'
          name_from: "Attribute Name"
          value_from: "Value"
          type: "getType"
